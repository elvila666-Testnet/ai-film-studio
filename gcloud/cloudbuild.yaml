steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-film-studio:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-film-studio:latest'
      - '.'
    timeout: 1200s

  # Push the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ai-film-studio:$BUILD_ID'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-film-studio'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ai-film-studio:$BUILD_ID'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--min-instances'
      - '10'
      - '--max-instances'
      - '20'
      - '--timeout=600'
      - '--set-env-vars'
      - 'NODE_ENV=production,GCS_BUCKET_NAME=ai-film-studio-assets,GCP_PROJECT_ID=$PROJECT_ID'
      - '--add-cloudsql-instances'
      - '$PROJECT_ID:us-central1:ai-film-studio-db'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,BUILT_IN_FORGE_API_KEY=GEMINI_API_KEY:latest,NANOBANANA_API_KEY=NANOBANANA_API_KEY:latest,SORA_API_KEY=SORA_API_KEY:latest,VEO3_API_KEY=VEO3_API_KEY:latest,REPLICATE_API_TOKEN=REPLICATE_API_TOKEN:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,JWT_SECRET=JWT_SECRET:latest,KIE_API_KEY=KIE_API_KEY:latest'

images:
  - 'gcr.io/$PROJECT_ID/ai-film-studio:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/ai-film-studio:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s


