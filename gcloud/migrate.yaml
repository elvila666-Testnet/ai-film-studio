steps:
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install
        # The DATABASE_URL must point to the unix socket provided by the Cloud SQL instance connection
        # Correct socket path pattern for Cloud Build: /cloudsql/[INSTANCE_CONNECTION_NAME]
        export DATABASE_URL="mysql://filmstudio:xGcpz3Zr4ekNqbL5@localhost/ai_film_studio?socketPath=/cloudsql/ai-film-studio-485900:us-central1:ai-film-studio-db"
        npx drizzle-kit push --config=drizzle.config.ts --force
    # This attaches the Cloud SQL instance to the build environment
    # Note: Cloud Build automatically mounts /cloudsql for us when we use this option
    # However, standard steps might not see it unless we are in the Gcloud builder or specify it.
    # Actually, the easiest way is to add it to the 'gcloud builds submit' command or use the specific gcloud tool.

availableSecrets:
  secretManager:
  - versionName: projects/553654730386/secrets/DATABASE_URL/versions/latest
    env: 'DATABASE_URL_RAW'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
